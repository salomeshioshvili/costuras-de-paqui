{% extends 'employee/base.html' %}
{% load i18n %}
{% block title %}{% trans "Scan ticket" %}{% endblock %}

{% block content %}
<div class="card" style="border-radius:var(--radius);border:1px solid var(--e-border);box-shadow:0 10px 32px rgba(26,26,26,0.05);">
  <div class="card-header" style="border-bottom:1px solid var(--e-border);padding-bottom:0.9rem;margin-bottom:1rem;">
    <span class="card-title">{% trans "Scan ticket" %}</span>
  </div>
  <p class="muted" style="margin-bottom:1rem;color:var(--e-muted);font-size:0.9rem;">
    {% trans "Point the camera at the ticket QR or enter the code manually." %}
  </p>
  <form method="get" class="emp-form" style="display:flex;flex-wrap:wrap;gap:0.75rem;align-items:flex-end;">
    <label style="flex:1;min-width:200px;">
      <span class="muted" style="display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;margin-bottom:0.35rem;">{% trans "Ticket code" %}</span>
      <input type="text" name="code" value="{{ code }}" class="form-control" placeholder="TKT-00001" autofocus>
    </label>
    <button class="btn btn-primary" type="submit">{% trans "Search" %}</button>
  </form>
</div>
{% endblock %}
