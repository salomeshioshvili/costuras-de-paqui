<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | StitchPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #ede9fe 0%, #f8f7ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 20px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(124,58,237,0.15); }
    .brand-icon { width: 60px; height: 60px; background: #7c3aed; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 16px; }
    .form-control { border-radius: 10px; border-color: #d4c8ff; padding: 10px 14px; }
    .form-control:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }
    .btn-primary { background: #7c3aed; border: none; border-radius: 10px; padding: 10px; font-weight: 600; }
    .btn-primary:hover { background: #6d28d9; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="brand-icon"><i class="bi bi-scissors"></i></div>
    <h4 style="font-weight:700;color:#1e1b4b">StitchPro</h4>
    <p style="color:#6b7280;font-size:14px">Sewing Shop Management System</p>
  </div>
  {% if form.errors %}
    <div class="alert alert-danger" style="font-size:13px">Invalid username or password.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" style="font-size:13px;font-weight:500">Username</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label" style="font-size:13px;font-weight:500">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign In</button>
  </form>
</div>
</body>
</html>
