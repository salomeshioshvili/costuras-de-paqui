{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff sign in · Costuras de Paqui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(160deg, #efe6ff 0%, #f7f4ef 40%, #e8f2fc 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .login-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      border: 1px solid #e8e0f5;
      box-shadow: 0 24px 64px rgba(132,94,194,0.14);
    }
    .brand-icon {
      width: 88px;
      height: 88px;
      object-fit: contain;
      border-radius: 20px;
      border: 1px solid #e8e0f5;
      padding: 6px;
      background: #fff;
      margin: 0 auto 1rem;
      display: block;
    }
    .form-control { border-radius: 14px; border-color: #dccdf9; padding: 11px 14px; }
    .form-control:focus { border-color: #845ec2; box-shadow: 0 0 0 3px rgba(132,94,194,0.16); }
    .btn-primary { background: #845ec2; border: none; border-radius: 14px; padding: 11px; font-weight: 800; }
    .btn-primary:hover { background: #6b3fa8; }
  </style>
</head>
<body>
<div class="login-stage">
  <div class="login-card">
    <div class="text-center mb-4">
      <img class="brand-icon" src="{% static 'branding/logo.png' %}" alt="Costuras de Paqui">
      <h4 style="font-weight:800;color:#1e1b2e;letter-spacing:-0.02em;">Costuras de Paqui</h4>
      <p style="color:#6b6580;font-size:14px;font-weight:600;">Workshop management (Django user)</p>
    </div>
    {% if form.errors %}
      <div class="alert alert-danger border-0 rounded-4" style="font-size:13px;font-weight:600;">Incorrect username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#6b6580;">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label" style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:#6b6580;">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
    <p class="text-center mt-3 mb-0" style="font-size:13px;font-weight:600;color:#6b6580;">
      <a href="{% url 'portal_home' %}" style="color:#845ec2;text-decoration:none;">← Customer site</a>
    </p>
  </div>
</div>
<p class="text-center mb-0 pb-4" style="font-size:12px;font-weight:700;color:#8878a8;">© {% now "Y" %} Costuras de Paqui · Internal access</p>
</body>
</html>
